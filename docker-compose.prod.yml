# Production Docker Compose Configuration for VORTE E-Commerce Platform
# This configuration includes:
# - MongoDB with authentication and replica set
# - TLS/SSL support
# - Production-grade security settings
# - Resource limits
# - Health checks

services:
  # MongoDB with Authentication and Replica Set
  mongo:
    image: mongo:7.0
    container_name: vorte-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--auth", "--keyFile", "/data/config/mongo-keyfile", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: vorte
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-keyfile:/data/config/mongo-keyfile:ro
      - ./scripts:/scripts:ro
    healthcheck:
      test: |
        mongosh --username ${MONGO_ROOT_USER} --password ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB Replica Set Initializer
  mongo-init:
    image: mongo:7.0
    container_name: vorte-mongo-init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: 
      - bash
      - -c
      - |
        mongosh --host mongo:27017 -u ${MONGO_ROOT_USER} -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --eval '
        try {
          rs.status();
          print("Replica set already initialized");
        } catch(e) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "mongo:27017" }]
          });
          print("Replica set initialized");
        }
        ' || true

  # Redis with Persistence
  redis:
    image: redis:7-alpine
    container_name: vorte-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: vorte-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API
  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: vorte-api:${VERSION:-latest}
    container_name: vorte-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Database
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/vorte?authSource=admin&replicaSet=rs0
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      
      # Security
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      
      # Argon2 (Production Settings)
      - ARGON2_MEMORY_MB=128
      - ARGON2_TIME_COST=2
      - ARGON2_PARALLELISM=4
      
      # Application
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      
      # Observability
      - PROMETHEUS_METRICS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-}
      - OTEL_SERVICE_NAME=vorte-api
      
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-https://vorte.com.tr}
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
      replicas: 2  # Run 2 instances for high availability
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Frontend Web
  web:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
        - VITE_API_URL=${API_URL:-https://api.vorte.com.tr}
    image: vorte-web:${VERSION:-latest}
    container_name: vorte-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      replicas: 2  # Run 2 instances for high availability
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy with TLS
  nginx:
    image: nginx:alpine
    container_name: vorte-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: vorte-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana (Metrics Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: vorte-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reconciliation Worker (Cron: every 10 minutes)
  reconciliation-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: vorte-api:${VERSION:-latest}
    container_name: vorte-reconciliation-worker
    restart: unless-stopped
    environment:
      # Database
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/vorte?authSource=admin&replicaSet=rs0
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Payment Providers
      - IYZICO_API_KEY=${IYZICO_API_KEY}
      - IYZICO_SECRET_KEY=${IYZICO_SECRET_KEY}
      - IYZICO_BASE_URL=${IYZICO_BASE_URL:-https://api.iyzipay.com}
      - PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID:-}
      - PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY:-}
      - PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT:-}
      
      # Application
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      
      # Observability
      - PROMETHEUS_METRICS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-}
      - OTEL_SERVICE_NAME=vorte-reconciliation-worker
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: >
      sh -c "
        while true; do
          echo '[$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")] Starting reconciliation worker...'
          python -m app.workers.reconciliation
          EXIT_CODE=$$?
          if [ $$EXIT_CODE -eq 0 ]; then
            echo '[$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")] Reconciliation completed successfully'
          else
            echo '[$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")] Reconciliation failed with exit code $$EXIT_CODE'
          fi
          echo '[$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")] Sleeping for 10 minutes...'
          sleep 600
        done
      "
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: vorte-network-prod
    driver: bridge
