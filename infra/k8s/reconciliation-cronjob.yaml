apiVersion: batch/v1
kind: CronJob
metadata:
  name: payment-reconciliation
  namespace: vorte
  labels:
    app: vorte
    component: reconciliation-worker
spec:
  # Schedule: Every 10 minutes
  schedule: "*/10 * * * *"
  
  # Keep last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  
  # Don't start new job if previous one is still running
  concurrencyPolicy: Forbid
  
  jobTemplate:
    metadata:
      labels:
        app: vorte
        component: reconciliation-worker
    spec:
      # Job timeout: 5 minutes (should complete much faster)
      activeDeadlineSeconds: 300
      
      # Retry failed jobs up to 2 times
      backoffLimit: 2
      
      template:
        metadata:
          labels:
            app: vorte
            component: reconciliation-worker
        spec:
          restartPolicy: OnFailure
          
          containers:
          - name: reconciliation
            image: vorte/api:latest
            imagePullPolicy: Always
            
            command:
            - python
            - -m
            - app.workers.reconciliation
            
            env:
            # MongoDB Configuration
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: uri
            
            # Redis Configuration
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
            
            # iyzico Configuration
            - name: IYZICO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-credentials
                  key: api-key
            
            - name: IYZICO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-credentials
                  key: secret-key
            
            - name: IYZICO_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-config
                  key: iyzico-base-url
            
            # PayTR Configuration (optional)
            - name: PAYTR_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: paytr-credentials
                  key: merchant-id
                  optional: true
            
            - name: PAYTR_MERCHANT_KEY
              valueFrom:
                secretKeyRef:
                  name: paytr-credentials
                  key: merchant-key
                  optional: true
            
            - name: PAYTR_MERCHANT_SALT
              valueFrom:
                secretKeyRef:
                  name: paytr-credentials
                  key: merchant-salt
                  optional: true
            
            # Application Configuration
            - name: ENVIRONMENT
              value: "production"
            
            - name: PROMETHEUS_METRICS
              value: "true"
            
            # Resource limits
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            
            # Security context
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
          
          # Service account for RBAC
          serviceAccountName: reconciliation-worker

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reconciliation-worker
  namespace: vorte
  labels:
    app: vorte
    component: reconciliation-worker

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
  namespace: vorte
  labels:
    app: vorte
    component: payment
data:
  iyzico-base-url: "https://api.iyzipay.com"
  # For sandbox/staging, use: "https://sandbox-api.iyzipay.com"
