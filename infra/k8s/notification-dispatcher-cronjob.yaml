# infra/k8s/notification-dispatcher-cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: notification-dispatcher
  namespace: vorte-payments
  labels:
    app: notification-dispatcher
    component: worker
spec:
  # Run every minute
  schedule: "*/1 * * * *"
  
  # Keep last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  
  # Prevent concurrent runs (at-most-once execution)
  concurrencyPolicy: Forbid
  
  jobTemplate:
    metadata:
      labels:
        app: notification-dispatcher
        component: worker
    spec:
      # Timeout after 5 minutes (should complete in <1 min normally)
      activeDeadlineSeconds: 300
      
      # Retry once on failure
      backoffLimit: 1
      
      template:
        metadata:
          labels:
            app: notification-dispatcher
            component: worker
        spec:
          restartPolicy: Never
          
          # Service account for MongoDB access
          serviceAccountName: vorte-payments
          
          containers:
          - name: dispatcher
            image: vorte/payment-backend:latest
            imagePullPolicy: Always
            
            command:
            - python
            - -m
            - app.workers.notification_dispatcher
            
            env:
            # MongoDB connection
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: connection-string
            
            # Email provider (SendGrid or SES)
            - name: EMAIL_PROVIDER
              value: "sendgrid"
            
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sendgrid-credentials
                  key: api-key
            
            - name: EMAIL_FROM
              value: "noreply@vorte.com"
            
            # SMS provider (NetGSM or Verimor)
            - name: SMS_PROVIDER
              value: "netgsm"
            
            - name: NETGSM_USERNAME
              valueFrom:
                secretKeyRef:
                  name: netgsm-credentials
                  key: username
            
            - name: NETGSM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netgsm-credentials
                  key: password
            
            - name: NETGSM_SENDER
              value: "VORTE"
            
            # Prometheus metrics (pushgateway)
            - name: PROMETHEUS_PUSHGATEWAY
              value: "http://prometheus-pushgateway:9091"
            
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            
            # Liveness probe: check if process is running
            livenessProbe:
              exec:
                command:
                - pgrep
                - -f
                - notification_dispatcher
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 2
          
          # Tolerate node taints for worker nodes
          tolerations:
          - key: "workload"
            operator: "Equal"
            value: "worker"
            effect: "NoSchedule"
          
          # Prefer scheduling on worker nodes
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                  - key: "workload"
                    operator: "In"
                    values:
                    - "worker"

---
# ServiceAccount for MongoDB access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vorte-payments
  namespace: vorte-payments

---
# Role for accessing secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vorte-payments-secrets
  namespace: vorte-payments
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vorte-payments-secrets
  namespace: vorte-payments
subjects:
- kind: ServiceAccount
  name: vorte-payments
  namespace: vorte-payments
roleRef:
  kind: Role
  name: vorte-payments-secrets
  apiGroup: rbac.authorization.k8s.io
