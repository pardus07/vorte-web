services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../../apps/backend/.env
    environment:
      MONGO_URI: "mongodb://mongo:27017/vorte"
      REDIS_URL: "redis://redis:6379/0"
      PROMETHEUS_METRICS: "true"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]
    volumes:
      - ../../apps/backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../../
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_BASE: "/api"
    depends_on:
      - api
    ports: ["5173:5173"]
    volumes:
      - ../../apps/frontend:/web
      - /web/node_modules

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports: ["80:80"]
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  minio_data:
