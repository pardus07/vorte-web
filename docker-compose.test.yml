services:
  mongo_test:
    image: mongo:7.0
    command: ["--replSet","rs0","--bind_ip_all"]
    ports: ["27117:27017"]
    healthcheck:
      test: ["CMD-SHELL","mongosh --eval 'db.adminCommand({ping:1})' || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
  
  mongo_init_test:
    image: mongo:7.0
    depends_on: [mongo_test]
    entrypoint: ["/bin/sh","-c"]
    command: >
      "sleep 2 &&
       mongosh --host mongo_test --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongo_test:27017\"}]});'
       && echo 'rs initiated'"
    restart: "no"
  
  redis_test:
    image: redis:7-alpine
    ports: ["6380:6379"]
  
  minio_test:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9002:9000","9003:9001"]
