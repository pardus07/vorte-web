#! minio-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: minio
    namespace: vortecomtr
    labels:
        com.docker.compose.project: vortecomtr
        com.docker.compose.service: minio
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: vortecomtr
            com.docker.compose.service: minio
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: vortecomtr
                com.docker.compose.service: minio
                com.docker.compose.network.default: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: vorte-minio
                  image: minio/minio:latest
                  imagePullPolicy: IfNotPresent
                  args:
                    - server
                    - /data
                    - --console-address
                    - :9001
                  env:
                    - name: MINIO_ROOT_PASSWORD
                      value: "minioadmin"
                    - name: MINIO_ROOT_USER
                      value: "minioadmin"
                  livenessProbe:
                    exec:
                        command: ['curl -f http://localhost:9000/minio/health/live']
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 5
                  ports:
                    - name: minio-9000
                      containerPort: 9000
                    - name: minio-9001
                      containerPort: 9001
                  volumeMounts:
                    - name: data
                      mountPath: /data
            volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: minio-minio-data
