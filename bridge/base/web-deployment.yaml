#! web-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: web
    namespace: vortecomtr
    labels:
        com.docker.compose.project: vortecomtr
        com.docker.compose.service: web
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: vortecomtr
            com.docker.compose.service: web
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: vortecomtr
                com.docker.compose.service: web
                com.docker.compose.network.default: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: vorte-web
                  image: vortecomtr-web
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: VITE_API_URL
                      value: "http://localhost:8000/api"
                  livenessProbe:
                    exec:
                        command: ['curl -f http://localhost:80']
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 5
                  ports:
                    - name: web-80
                      containerPort: 80
