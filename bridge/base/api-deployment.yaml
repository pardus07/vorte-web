#! api-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: api
    namespace: vortecomtr
    labels:
        com.docker.compose.project: vortecomtr
        com.docker.compose.service: api
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: vortecomtr
            com.docker.compose.service: api
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: vortecomtr
                com.docker.compose.service: api
                com.docker.compose.network.default: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: vorte-api
                  image: vortecomtr-api
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: ENVIRONMENT
                      value: "development"
                    - name: JWT_SECRET
                      value: "your-secret-key-change-in-production"
                    - name: MINIO_ACCESS_KEY
                      value: "minioadmin"
                    - name: MINIO_ENDPOINT
                      value: "minio:9000"
                    - name: MINIO_SECRET_KEY
                      value: "minioadmin"
                    - name: MONGO_URI
                      value: "mongodb://admin:password@mongo:27017/vorte?authSource=admin"
                    - name: PROMETHEUS_METRICS
                      value: "true"
                    - name: REDIS_URL
                      value: "redis://redis:6379/0"
                  livenessProbe:
                    exec:
                        command: ['curl -f http://localhost:8000/api/health']
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 5
                  ports:
                    - name: api-8000
                      containerPort: 8000
